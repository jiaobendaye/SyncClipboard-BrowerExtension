<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SyncClipboard Settings</title>
<link rel="stylesheet" href="options.css">
</head>
<body>
<div id="app">
  <h1>SyncClipboard Settings</h1>

  <section>
    <h2>WebDAV Server</h2>
    <div class="field">
      <label for="webdav-url">URL</label>
      <input type="url" id="webdav-url" placeholder="https://webdav.example.com/sync/">
    </div>
    <div class="field">
      <label for="webdav-username">Username</label>
      <input type="text" id="webdav-username" placeholder="user">
    </div>
    <div class="field">
      <label for="webdav-password">Password</label>
      <input type="password" id="webdav-password" placeholder="••••••••">
    </div>
    <div class="field-row">
      <button id="test-connection-btn" class="btn secondary">Test Connection</button>
      <span id="test-result"></span>
    </div>
  </section>

  <section>
    <h2>Limits</h2>
    <div class="field">
      <label for="max-size-input">Max upload size (MB)</label>
      <input type="number" id="max-size-input" min="1" max="1024" placeholder="50">
      <span id="max-size-error" class="field-error"></span>
    </div>
    <div class="field">
      <label for="history-capacity-input">Recent history capacity</label>
      <input type="number" id="history-capacity-input" min="1" max="500" placeholder="50">
      <span id="history-capacity-error" class="field-error"></span>
    </div>
  </section>

  <div class="actions">
    <button id="save-btn" class="btn primary">Save Settings</button>
    <span id="save-result"></span>
  </div>
</div>

<script type="module" src="options.js"></script>
</body>
</html>
