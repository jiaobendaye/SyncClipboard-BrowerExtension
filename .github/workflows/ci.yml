name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Unit tests
        run: npm run test:unit

  package:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Package extension
        run: |
          cd extension
          zip -r ../syncclipboard-extension.zip . \
            -x ".claude/*" "CLAUDE.md" ".gstack/*"

      - uses: actions/upload-artifact@v4
        with:
          name: syncclipboard-extension
          path: syncclipboard-extension.zip
